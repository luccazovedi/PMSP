<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Legislação — Código Penal, CTB e RDPM</title>
  <meta name="description" content="Consulta ao Código Penal, ao Código de Trânsito Brasileiro e ao RDPM da PMESP: busque por artigo ou palavra, com ficha estruturada das infrações, medidas administrativas e transgressões disciplinares.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topo">
    <h1>Consulta de Legislação</h1>
    <p id="subtitulo" class="subtitulo"></p>

    <div id="seletor-lei" class="seletor-lei" role="radiogroup" aria-label="Escolha a lei para buscar"></div>

    <form id="form-busca" class="busca" autocomplete="off">
      <div class="campo-wrap">
        <input
          id="campo-busca"
          type="search"
          placeholder="Busque um artigo (ex.: 121, 165, 121-A) ou uma palavra (ex.: furto, capacete)"
          aria-label="Buscar artigo ou palavra"
          role="combobox"
          aria-expanded="false"
          aria-controls="sugestoes"
          aria-autocomplete="list"
          required
        >
        <ul id="sugestoes" class="sugestoes" role="listbox" hidden></ul>
      </div>
      <button type="submit">Buscar</button>
    </form>
    <div id="atalhos" class="atalhos" aria-label="Buscas frequentes"></div>
    <p id="resumo" class="resumo" role="status"></p>
  </header>

  <main id="resultados" class="resultados" aria-live="polite"></main>

  <footer class="rodape">
    <p id="info-fonte"></p>
    <p>Dados abertos:
      <a href="api/index.json" target="_blank" rel="noopener"><code>api/index.json</code></a> ·
      <a href="api/cp/artigos/121.json" target="_blank" rel="noopener"><code>api/cp/artigos/121.json</code></a> ·
      <a href="api/ctb/artigos/165.json" target="_blank" rel="noopener"><code>api/ctb/artigos/165.json</code></a> ·
      <a href="api/ctb/estrutura.json" target="_blank" rel="noopener"><code>api/ctb/estrutura.json</code></a></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
