name: Atualizar dados do Planalto

# Baixa o HTML oficial das leis, regera o JSON estruturado, valida e commita.
# Rode manualmente (workflow_dispatch) sempre que quiser sincronizar com o
# texto vigente no Planalto.
on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/fetch-planalto.yml']

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Baixar HTML das leis (Planalto)
        run: |
          mkdir -p data/fonte
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848.htm" \
            -o data/fonte/del2848.htm
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.planalto.gov.br/ccivil_03/leis/l9503.htm" \
            -o data/fonte/l9503.htm
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.planalto.gov.br/ccivil_03/decreto-lei/del3689.htm" \
            -o data/fonte/del3689.htm

      - name: Baixar RDPM da PMESP (LC 893/2001 — ALESP)
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          # tenta o texto compilado; se não existir, usa o original
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.al.sp.gov.br/repositorio/legislacao/lei.complementar/2001/compilacao-lei.complementar-893-09.03.2001.html" \
            -o data/fonte/lc893.html \
          || curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.al.sp.gov.br/repositorio/legislacao/lei.complementar/2001/lei.complementar-893-09.03.2001.html" \
            -o data/fonte/lc893.html
          ls -la data/fonte

      - name: Regerar e validar o JSON e o site estático
        run: |
          npm ci
          npm run build-data
          npm test
          npm run build-site

      - name: Commitar atualização
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          git commit -m "chore: atualiza dados do Código Penal a partir do Planalto" || echo "sem mudanças"
          git push
