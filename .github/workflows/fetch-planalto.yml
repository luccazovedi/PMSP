name: Baixar fonte do Planalto

on:
  workflow_dispatch:
  push:
    branches: [claude/penal-code-api-landing-7lnmbp]
    paths: ['.github/workflows/fetch-planalto.yml']

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Baixar HTML do Código Penal (Planalto)
        run: |
          mkdir -p data/fonte
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm" \
            -o data/fonte/del2848compilado.htm
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848.htm" \
            -o data/fonte/del2848.htm
          ls -la data/fonte

      - name: Commitar fonte baixada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fonte
          git commit -m "chore: adiciona HTML oficial do Código Penal baixado do Planalto" || echo "sem mudanças"
          git push
