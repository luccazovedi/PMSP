name: Atualizar dados do Planalto

# Baixa o HTML oficial das leis, regera o JSON estruturado, valida e commita.
# Rode manualmente (workflow_dispatch) sempre que quiser sincronizar com o
# texto vigente no Planalto/ALESP.
on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/fetch-planalto.yml']

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Baixar HTML das leis (Planalto)
        run: |
          mkdir -p data/fonte
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          baixar() {
            curl -fSL --retry 3 --retry-delay 5 -A "$UA" "$2" -o "data/fonte/$1"
          }
          baixar constituicao.htm "https://www.planalto.gov.br/ccivil_03/constituicao/constituicao.htm"
          baixar del2848.htm      "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848.htm"
          baixar del3689.htm      "https://www.planalto.gov.br/ccivil_03/decreto-lei/del3689.htm"
          baixar del1001.htm      "https://www.planalto.gov.br/ccivil_03/decreto-lei/del1001.htm"
          baixar del1002.htm      "https://www.planalto.gov.br/ccivil_03/decreto-lei/del1002.htm"
          baixar l9503.htm        "https://www.planalto.gov.br/ccivil_03/leis/l9503.htm"
          baixar l11343.htm       "https://www.planalto.gov.br/ccivil_03/_ato2004-2006/2006/lei/l11343.htm"
          baixar l11340.htm       "https://www.planalto.gov.br/ccivil_03/_ato2004-2006/2006/lei/l11340.htm"
          baixar l10826.htm       "https://www.planalto.gov.br/ccivil_03/leis/2003/l10.826.htm"
          baixar l13869.htm       "https://www.planalto.gov.br/ccivil_03/_ato2019-2022/2019/lei/L13869.htm"
          baixar l8069.htm        "https://www.planalto.gov.br/ccivil_03/leis/l8069.htm"
          baixar l10741.htm       "https://www.planalto.gov.br/ccivil_03/leis/2003/l10.741.htm"
          baixar l12850.htm       "https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2013/lei/l12850.htm"
          baixar l8072.htm        "https://www.planalto.gov.br/ccivil_03/leis/l8072.htm"
          baixar del3688.htm      "https://www.planalto.gov.br/ccivil_03/decreto-lei/del3688.htm"
          ls -la data/fonte

      - name: Baixar tabela de enquadramentos RENAINF (SENATRAN)
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          URLBASE="https://www.gov.br/transportes/pt-br/centrais-de-conteudo/tabela-codigo-infracoes-renainf-xlsx"
          baixou=""
          for u in "$URLBASE/@@download/file" "$URLBASE"; do
            curl -fSL --retry 2 --retry-delay 5 -A "$UA" "$u" -o /tmp/renainf.bin || continue
            if file /tmp/renainf.bin | grep -qi 'zip\|excel\|spreadsheet'; then baixou=sim; break; fi
            # veio uma página HTML: procura o link do .xlsx dentro dela
            link=$(grep -o 'https[^"]*\.xlsx' /tmp/renainf.bin | head -1 || true)
            if [ -n "$link" ]; then
              curl -fSL -A "$UA" "$link" -o /tmp/renainf.bin || continue
              file /tmp/renainf.bin | grep -qi 'zip\|excel\|spreadsheet' && baixou=sim && break
            fi
          done
          if [ "$baixou" = "sim" ]; then
            mv /tmp/renainf.bin data/fonte/renainf.xlsx
            ls -la data/fonte/renainf.xlsx
          else
            echo "AVISO: não foi possível baixar a tabela RENAINF"
            file /tmp/renainf.bin || true
            head -c 600 /tmp/renainf.bin || true
          fi

      - name: Baixar RDPM da PMESP (LC 893/2001 — ALESP)
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          curl -fSL --retry 3 --retry-delay 5 -A "$UA" \
            "https://www.al.sp.gov.br/repositorio/legislacao/lei.complementar/2001/lei.complementar-893-09.03.2001.html" \
            -o data/fonte/lc893.html

      - name: Regerar e validar o JSON e o site estático
        run: |
          npm ci
          npm run build-data
          npm run build-mbft || echo "tabela RENAINF indisponível — mantendo a anterior"
          npm test
          npm run build-site || true

      - name: Commitar atualização
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          git commit -m "chore: atualiza dados das leis a partir das fontes oficiais" || echo "sem mudanças"
          git push
